        flex-direction: column;
        align-items: center;

      .calc-btn:hover {
        background: #6a0113;
      }
      .calc-btn.visible {
        display: block;
      }

      /* Main content — single scrolling page, no tabs */
      .maincont {
        display: none;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 1200px;
        padding: 0 16px 60px;
      }
      .maincont.visible {
        display: flex;
      }

      /* Section titles */
      .section-title {
        font-size: 1.3em;
        font-weight: 600;
        margin: 48px 0 24px;
        text-align: center;
        color: #850117;
      }

      /* ── STAR CIRCLE ── */
      .circle-container {
        margin-top: 100px;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 90vmin;
        height: 90vmin;
        position: relative;
      }
      .circle {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 0.25vmin solid #000;
      }
      .center-image {
        position: absolute;
        top: 48%;
        left: 51%;
        width: 70%;
        height: 70%;
        transform: translate(-50%, -50%);
      }
      .outer-point {
        position: absolute;
        background-color: black;
        border-radius: 50%;
      }
      .outer-point.small {
        width: 0.55vmin;
        height: 0.55vmin;
        margin-left: -1px;
        margin-top: -1px;
      }
      .outer-point.large {
        width: 1vmin;
        height: 1vmin;
        background: #850117;
      }
      .ring-label {
        position: absolute;
        font-size: 1vmin;
        font-weight: bold;
        color: #000;
        transform: translate(-50%, -50%);
        white-space: nowrap;
      }
      .ring-label.large {
        font-size: 1.5vmin;
      }
      .ring-number {
        position: absolute;
        color: #000;
        transform: translate(-50%, -50%);
        white-space: nowrap;
        cursor: pointer;
      }
      .ring-number:hover {
        color: #850117;
        font-weight: bold;
      }
      .ring-number.large {
        font-size: 1.5vmin;
        font-weight: bold;
        color: #850117;
      }
      .ring-number.small {
        font-size: 1vmin;
      }

      /* ── STAR POINTS (shared) ── */
      .star-point {
        position: absolute;
        width: 6vmin;
        height: 6vmin;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 2.2vmin;
        background: #e5e5e5;
        color: rgba(132, 0, 22, 1);
        opacity: 0;
        animation: fadeIn 1s forwards;
        cursor: pointer;
        outline: 0.6vmin solid rgba(229, 229, 229, 0.5);
        user-select: none;
        font-family: "Inter", sans-serif;
        transition: transform 0.15s;
      }
      .star-point:hover {
        transform: scale(1.15);
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
      .star-point1 {
        background: rgb(132, 0, 22);
        color: white;
        outline: 0.9vmin solid rgba(132, 0, 22, 0.5);
      }
      .star-point2 {

      }

        computed[key] = val;
        document
          .querySelectorAll('[data-key="' + key + '"]')
          .forEach(function (el) {
            el.textContent = val;
          });
      }

      function updateTextContainer(energyNum) {
        var textEl = document.getElementById("text-container");
        var d = ENERGY_DESC[energyNum];
        if (!d) {
          textEl.innerHTML = "";
          return;
        }
        var h = "<strong>" + d.title + "</strong><br/><br/>";
        h += "<strong>Эерэг илрэл</strong><br/><ul>";
        d.plus.forEach(function (p) {
          h += "<li>" + p + "</li>";
        });
        h += "</ul><strong>Сөрөг илрэл</strong><br/><ul>";
        d.minus.forEach(function (m) {
          h += "<li>" + m + "</li>";
        });
        h += "</ul>";
        textEl.innerHTML = h;
        textEl.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      var ttEl = document.getElementById("tooltip");
      function buildTTHTML(n) {
        var d = ENERGY_DESC[n];
        if (!d) return "<h4>" + n + "</h4>";
        var h =
          "<h4>" + d.title + '</h4><div class="sec">✅ Эерэг тал</div><ul>';
        d.plus.forEach(function (p) {
          h += "<li>" + p + "</li>";
        });
        h += '</ul><div class="sec">⚠️ Сөрөг тал</div><ul>';
        d.minus.forEach(function (m) {
          h += "<li>" + m + "</li>";
        });
        return h + "</ul>";
      }
      function showTT(n, el) {
        if (!n) return;
        ttEl.innerHTML = buildTTHTML(n);
        ttEl.classList.add("visible");
        var r = el.getBoundingClientRect(),
          sy = window.scrollY || window.pageYOffset,
          sx = window.scrollX || window.pageXOffset,
          tw = 360,
          tx = r.right + sx + 8;
        if (tx + tw > window.innerWidth + sx - 10) tx = r.left + sx - tw - 8;
        if (tx < sx + 4) tx = sx + 4;
        ttEl.style.left = tx + "px";
        ttEl.style.top = r.top + sy + "px";
      }
      function hideTT() {
        ttEl.classList.remove("visible");
      }

      function attachTooltips() {
        document.querySelectorAll(".star-point").forEach(function (el) {
          el.addEventListener("mouseenter", function () {
            var v = computed[this.getAttribute("data-key")];
            if (v != null) showTT(v, this);
          });
          el.addEventListener("mouseleave", hideTT);
          el.addEventListener("click", function () {
            var v = computed[this.getAttribute("data-key")];
            if (v != null) updateTextContainer(v);
          });
        });
      }

      var inputEl = document.getElementById("birthdate");
      var btnEl = document.getElementById("calcBtn");
      inputEl.addEventListener("input", function () {
        var v = this.value.replace(/\D/g, "");
        if (v.length >= 2) v = v.slice(0, 2) + "." + v.slice(2);
        if (v.length >= 5) v = v.slice(0, 5) + "." + v.slice(5);
        this.value = v.slice(0, 10);
        btnEl.classList.toggle("visible", this.value.length === 10);
      });
      inputEl.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && this.value.length === 10) calculate();
      });
      inputEl.focus();

      function calculate() {
        var parts = document.getElementById("birthdate").value.split(".");
        var day = parseInt(parts[0]),
          month = parseInt(parts[1]);
        var year = reduceTo22(
          parts[2].split("").reduce(function (s, d) {
            return s + parseInt(d);
          }, 0),
        );
        var sp1 = month,
          sp2 = year,
          sp5 = reduceTo22(day);
        var sp3 = reduceTo22(sp1 + sp2 + sp5),
          sp4 = reduceTo22(sp1 + sp2 + sp3 + sp5),
          sp6 = reduceTo22(sp1 + sp2 + sp3 + sp4 + sp5);
        var sp8 = reduceTo22(sp1 + sp5),
          sp10 = reduceTo22(sp1 + sp2),
          sp20 = reduceTo22(sp3 + sp2),
          sp21 = reduceTo22(sp3 + sp4),
          sp19 = reduceTo22(sp5 + sp4);
        var sp7 = reduceTo22(sp8 + sp5),
          sp22 = reduceTo22(sp19 + sp5),
          sp12 = reduceTo22(sp19 + sp8),
          sp17 = reduceTo22(sp8 + sp1),
          sp18 = reduceTo22(sp10 + sp1);
        var sp9 = reduceTo22(sp8 + sp10),
          sp13 = sp9,
          sp11 = reduceTo22(sp2 + sp10),
          sp27 = reduceTo22(sp2 + sp20),
          sp14 = reduceTo22(sp20 + sp10);
        var sp26 = reduceTo22(sp3 + sp20),
          sp25 = reduceTo22(sp3 + sp21),
          sp16 = reduceTo22(sp21 + sp20),
          sp24 = reduceTo22(sp4 + sp21),
          sp23 = reduceTo22(sp19 + sp4),
          sp15 = reduceTo22(sp19 + sp21);
        var sp28 = reduceTo22(sp22 + sp7),
          sp29 = reduceTo22(sp5 + sp12),
          sp30 = reduceTo22(sp17 + sp18),
          sp31 = reduceTo22(sp1 + sp9);
        var sp32 = reduceTo22(sp11 + sp27),
          sp33 = reduceTo22(sp2 + sp14),
          sp34 = reduceTo22(sp26 + sp25),
          sp35 = reduceTo22(sp3 + sp16);
        var sp36 = reduceTo22(sp23 + sp24),
          sp37 = reduceTo22(sp4 + sp15);
        var new1 = reduceTo22(sp5 + sp2 + sp1 + sp3 + sp4),
          new2 = reduceTo22(sp8 + sp10 + sp20 + sp19 + sp21),
          new3 = reduceTo22(new1 + new2);
        setAllByKey("month", sp1);
        setAllByKey("year", sp2);
        setAllByKey("day", sp5);
        setAllByKey("sp3", sp3);
        setAllByKey("sp4", sp4);
        setAllByKey("sp6", sp6);
        setAllByKey("sp7", sp7);
        setAllByKey("sp8", sp8);
        setAllByKey("sp9", sp9);
        setAllByKey("sp10", sp10);
        setAllByKey("sp11", sp11);
        setAllByKey("sp12", sp12);
        setAllByKey("sp13", sp13);
        setAllByKey("sp14", sp14);
        setAllByKey("sp15", sp15);
        setAllByKey("sp16", sp16);
        setAllByKey("sp17", sp17);
        setAllByKey("sp18", sp18);
        setAllByKey("sp19", sp19);
        setAllByKey("sp20", sp20);
        setAllByKey("sp21", sp21);
        setAllByKey("sp22", sp22);
        setAllByKey("sp23", sp23);
        setAllByKey("sp24", sp24);
        setAllByKey("sp25", sp25);
        setAllByKey("sp26", sp26);
        setAllByKey("sp27", sp27);
        setAllByKey("sp28", sp28);
        setAllByKey("sp29", sp29);
        setAllByKey("sp30", sp30);
        setAllByKey("sp31", sp31);
        setAllByKey("sp32", sp32);
        setAllByKey("sp33", sp33);
        setAllByKey("sp34", sp34);
        setAllByKey("sp35", sp35);
        setAllByKey("sp36", sp36);
        setAllByKey("sp37", sp37);
        setAllByKey("new1", new1);
        setAllByKey("new2", new2);
        setAllByKey("new3", new3);
        updateTextContainer(sp5);
        buildOuterRing(sp5, sp1, sp2, sp3, sp4, sp8, sp10, sp19, sp20, sp21);
        document.getElementById("inputSection").style.display = "none";
        document.getElementById("mainContent").classList.add("visible");
        attachTooltips();
      }

      function buildOuterRing(
        sp5,
        sp1,
        sp2,
        sp3,
        sp4,
        sp8,
        sp10,
        sp19,
        sp20,
        sp21,
      ) {
        var circle = document.getElementById("circle");
        circle
          .querySelectorAll(".outer-point,.ring-label,.ring-number")
          .forEach(function (e) {
            e.remove();
          });
        var rv = {};
        function r22(n) {
          return reduceTo22(n);
        }
        function g(k) {
          return rv[k] || 0;
        }
        rv[0] = r22(sp5);
        rv[5] = r22(sp5 + sp8);
        rv[10] = sp8;
        rv[15] = r22(sp1 + sp8);
        rv[20] = sp1;
        rv[25] = r22(sp10 + sp1);
        rv[30] = sp10;
        rv[35] = r22(sp10 + sp2);
        rv[40] = sp2;
        rv[45] = r22(sp2 + sp20);
        rv[50] = sp20;
        rv[55] = r22(sp20 + sp3);
        rv[60] = sp3;
        rv[65] = r22(sp3 + sp21);
        rv[70] = sp21;
        rv[75] = r22(sp21 + sp4);
        rv[80] = sp4;
        rv[85] = r22(sp19 + sp4);
        rv[90] = sp19;
        rv[95] = r22(sp5 + sp19);
        rv[2] = r22(g(5) + g(0));
        rv[7] = r22(g(5) + g(10));
        rv[12] = r22(g(15) + g(10));
        rv[17] = r22(g(15) + g(20));
        rv[22] = r22(g(25) + g(20));
        rv[27] = r22(g(25) + g(30));
        rv[32] = r22(g(35) + g(30));
        rv[37] = r22(g(35) + g(40));
        rv[42] = r22(g(45) + g(40));
        rv[47] = r22(g(45) + g(50));
        rv[52] = r22(g(55) + g(50));
        rv[57] = r22(g(55) + g(60));
        rv[62] = r22(g(65) + g(60));
        rv[67] = r22(g(65) + g(70));
        rv[72] = r22(g(75) + g(70));
        rv[77] = r22(g(75) + g(80));
        rv[82] = r22(g(85) + g(80));
        rv[87] = r22(g(85) + g(90));
        rv[92] = r22(g(95) + g(90));
        rv[97] = r22(g(95) + g(0));
        rv[1] = r22(g(2) + g(0));
        rv[6] = r22(g(7) + g(5));
        rv[11] = r22(g(12) + g(10));
        rv[16] = r22(g(17) + g(15));
        rv[21] = r22(g(22) + g(20));
        rv[26] = r22(g(27) + g(25));
        rv[31] = r22(g(32) + g(30));
        rv[36] = r22(g(37) + g(35));
        rv[41] = r22(g(42) + g(40));
        rv[46] = r22(g(47) + g(45));
        rv[51] = r22(g(52) + g(50));
        rv[56] = r22(g(57) + g(55));
        rv[61] = r22(g(62) + g(60));
        rv[66] = r22(g(67) + g(65));
        rv[71] = r22(g(72) + g(70));
        rv[76] = r22(g(77) + g(75));
        rv[81] = r22(g(82) + g(80));
        rv[86] = r22(g(87) + g(85));
        rv[91] = r22(g(92) + g(90));
        rv[96] = r22(g(95) + g(97));
        rv[3] = r22(g(2) + g(5));
        rv[8] = r22(g(7) + g(10));
        rv[13] = r22(g(12) + g(15));
        rv[18] = r22(g(17) + g(20));
        rv[23] = r22(g(22) + g(25));
        rv[28] = r22(g(27) + g(30));
        rv[33] = r22(g(32) + g(35));
        rv[38] = r22(g(37) + g(40));
        rv[43] = r22(g(42) + g(45));
        rv[48] = r22(g(47) + g(50));
        rv[53] = r22(g(52) + g(55));
        rv[58] = r22(g(57) + g(60));
        rv[63] = r22(g(62) + g(65));
        rv[68] = r22(g(67) + g(70));
        rv[73] = r22(g(72) + g(75));
        rv[78] = r22(g(77) + g(80));
        rv[83] = r22(g(82) + g(85));
        rv[88] = r22(g(87) + g(90));
        rv[93] = r22(g(92) + g(95));
        rv[98] = r22(g(0) + g(97));
        var radius = 45;
        var la = [
          531, 188, 207, 228, 249, 270, 291, 312, 333, 352, 367, 382, 397, 416,
          432, 450, 468, 486, 501, 516,
        ];
        var n = la.length,
          ss = [];
        for (var si = 0; si < n; si++) ss.push((la[(si + 1) % n] - la[si]) / 4);
        var cai = 0,
          ca = la[0];
        for (var i = 0; i < 80; i++) {
          var isL = i % 4 === 0;
          if (isL) {
            ca = la[cai];
            cai = (cai + 1) % n;
          } else {
            ca += ss[cai === 0 ? n - 1 : cai];
          }
          var yl = Math.floor(i / 4) * 5 + (i % 4),
            ar = (ca * Math.PI) / 180;
          var x = radius + radius * Math.cos(ar),
            y = radius + radius * Math.sin(ar);
          var dot = document.createElement("div");
          dot.className = "outer-point " + (isL ? "large" : "small");
          dot.style.left =
            "calc(" + x + "vmin - " + (isL ? 0.5 : 0.125) + "vmin)";
          dot.style.top =
            "calc(" + y + "vmin - " + (isL ? 0.5 : 0.125) + "vmin)";
          circle.appendChild(dot);
          var lo = isL ? 4 : 2,
            lx = radius + (radius + lo) * Math.cos(ar),
            ly = radius + (radius + lo) * Math.sin(ar);
          var lbl = document.createElement("div");
          lbl.className = "ring-label" + (isL ? " large" : "");
          lbl.style.left = lx + "vmin";
          lbl.style.top = ly + "vmin";
          lbl.textContent = isL
            ? (yl === 0 ? "0/100" : yl) + " нас"
            : yl + "-" + (yl + 1);
          circle.appendChild(lbl);
          var no = isL ? 4 : 2,
            nx = radius + (radius - no) * Math.cos(ar),
            ny = radius + (radius - no) * Math.sin(ar);
          var num = document.createElement("div");
          num.className = "ring-number" + (isL ? " large" : " small");
          num.style.left = nx + "vmin";
          num.style.top = ny + "vmin";
          var ev = rv[yl] || 0;
          num.textContent = ev;
          (function (ev, el) {
            el.addEventListener("mouseenter", function () {
              showTT(ev, el);
            });
            el.addEventListener("mouseleave", hideTT);
            el.addEventListener("click", function () {
              updateTextContainer(ev);
            });
          })(ev, num);
          circle.appendChild(num);
        }
      }
    </script>
  </body>
</html>
